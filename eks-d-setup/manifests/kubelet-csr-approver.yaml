# Kubelet CSR auto-approver — replicates EKS control-plane behavior for self-managed clusters.
#
# Approves two signer types that kube-controller-manager does NOT auto-approve:
#   kubernetes.io/kube-apiserver-client-kubelet — node bootstrap / client certs (node joining)
#   kubernetes.io/kubelet-serving               — kubelet TLS serving certs (metrics-server, etc.)
#
# Init container (busybox) copies its /bin applets to EmptyDir at /opt/busybox/.
# Main container (chainguard kubectl) sources sh/awk/xargs/sleep from /opt/busybox/.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubelet-csr-approver
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubelet-csr-approver
rules:
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests/approval"]
    verbs: ["update"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["signers"]
    resourceNames:
      - "kubernetes.io/kube-apiserver-client-kubelet"
      - "kubernetes.io/kubelet-serving"
    verbs: ["approve"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubelet-csr-approver
subjects:
  - kind: ServiceAccount
    name: kubelet-csr-approver
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: kubelet-csr-approver
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubelet-csr-approver
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubelet-csr-approver
  template:
    metadata:
      labels:
        app: kubelet-csr-approver
    spec:
      serviceAccountName: kubelet-csr-approver
      priorityClassName: system-cluster-critical
      tolerations:
        - operator: Exists
          effect: NoSchedule
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      initContainers:
        - name: copy-busybox
          image: public.ecr.aws/docker/library/busybox:musl
          command: ["sh", "-c", "cp /bin/busybox /opt/busybox/busybox"]
          volumeMounts:
            - name: kube-bin
              mountPath: /opt/busybox
      containers:
        - name: approver
          image: KUBECTL_IMAGE_PLACEHOLDER
          command:
            - /opt/busybox/busybox
            - sh
            - -c
            - |
              while true; do
                kubectl get csr --no-headers 2>/dev/null \
                  | /opt/busybox/busybox awk '/Pending/ && /kubernetes\.io\/(kube-apiserver-client-kubelet|kubelet-serving)/ {print $1}' \
                  | /opt/busybox/busybox xargs -r kubectl certificate approve 2>/dev/null || true
                /opt/busybox/busybox sleep 10
              done
          volumeMounts:
            - name: kube-bin
              mountPath: /opt/busybox
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              memory: 40Mi
      volumes:
        - name: kube-bin
          emptyDir:
            sizeLimit: 100Mi
