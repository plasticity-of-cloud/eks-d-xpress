name: Build AMI

on:
  push:
    branches: [main]
    paths:
      - 'ami-builder/**'
      - 'eks-d-setup/**'
      - 'COMPONENT_VERSIONS.md'
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: 'Kubernetes version (e.g. 1.35)'
        default: '1.35'
      ami_version:
        description: 'AMI version tag (e.g. 1.0.0)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer init
        run: packer init ami-builder/eks-dx.pkr.hcl

      - name: Build AMI
        env:
          KUBERNETES_VERSION: ${{ github.event.inputs.kubernetes_version || '1.35' }}
          AMI_VERSION: ${{ github.event.inputs.ami_version || github.sha }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          packer build \
            -var "aws_region=${AWS_REGION}" \
            -var "kubernetes_version=${KUBERNETES_VERSION}" \
            -var "ami_version=${AMI_VERSION}" \
            ami-builder/eks-dx.pkr.hcl

      - name: Write AMI ID to SSM
        env:
          KUBERNETES_VERSION: ${{ github.event.inputs.kubernetes_version || '1.35' }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          AMI_ID=$(cat packer-manifest.json | python3 -c \
            "import sys,json; builds=json.load(sys.stdin)['builds']; print(builds[-1]['artifact_id'].split(':')[-1])")
          aws ssm put-parameter \
            --name "/eks-d-xpress/infra/ami/${AWS_REGION}/${KUBERNETES_VERSION}/${{ matrix.arch }}" \
            --value "$AMI_ID" \
            --type String \
            --overwrite \
            --region "$AWS_REGION"
          echo "Published AMI $AMI_ID → SSM /eks-d-xpress/infra/ami/${AWS_REGION}/${KUBERNETES_VERSION}/${{ matrix.arch }}"
