name: Release

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'ami-builder/**'
      - 'eks-d-setup/**'
      - 'COMPONENT_VERSIONS.md'
  workflow_dispatch:
    inputs:
      k8s_versions:
        description: 'Kubernetes versions to build (comma-separated)'
        required: true
        default: '1.35,1.36'
      build_ami:
        description: 'Build AMIs after ecr-credential-provider'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write  # OIDC for AWS

jobs:
  # ── Step 1: Build ecr-credential-provider natively per arch ──────────────
  build-ecr-credential-provider:
    uses: ./.github/workflows/build-ecr-credential-provider.yml
    with:
      k8s_versions: ${{ inputs.k8s_versions || '1.35,1.36' }}

  # ── Step 2: Build AMIs (Packer) ───────────────────────────────────────────
  build-ami:
    needs: build-ecr-credential-provider
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ami }}
    strategy:
      matrix:
        k8s_version: ['1.35', '1.36']
        arch: ['arm64', 'x86_64']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ecr-credential-provider artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ami-builder/files/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION }}

      - name: Build AMI
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          make -C ami-builder build \
            AWS_REGION="$AWS_REGION" \
            KUBERNETES_VERSION="${{ matrix.k8s_version }}" \
            AMI_VERSION="$(date +%Y%m%d-%H%M)" \
            ARCH="${{ matrix.arch }}"
          cp ami-builder/ami-manifest-entries.json \
             ami-manifest-${{ matrix.k8s_version }}-${{ matrix.arch }}.json

      - name: Sign AMI
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          AMI_VERSION=$(date +%Y%m%d-%H%M)
          make -C ami-builder sign AWS_REGION="$AWS_REGION" AMI_VERSION="$AMI_VERSION"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.k8s_version }}-${{ matrix.arch }}
          path: ami-builder/sbom-${{ matrix.arch }}-*.spdx.json
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: ami-manifest-${{ matrix.k8s_version }}-${{ matrix.arch }}
          path: ami-manifest-${{ matrix.k8s_version }}-${{ matrix.arch }}.json
          retention-days: 1

  # ── Step 4: Create GitHub release with all artifacts ─────────────────────
  release:
    needs: [build-ami]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Prepare release scripts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp eks-d-setup/12-install-eks-dx-pod-identity.sh "install-eks-dx-pod-identity-${VERSION}.sh"
          # Also publish without version suffix for convenience
          cp eks-d-setup/12-install-eks-dx-pod-identity.sh install-eks-dx-pod-identity.sh

      - name: Merge AMI manifest entries
        run: |
          python3 - <<'EOF'
          import json, glob, collections

          entries = []
          for f in glob.glob("ami-manifest-*.json"):
              entries.extend(json.load(open(f)))

          # Build nested structure: {k8s_version: {arch: {region: ami_id}}}
          manifest = collections.defaultdict(lambda: collections.defaultdict(dict))
          for e in entries:
              manifest[e["kubernetes_version"]][e["arch"]][e["region"]] = e["ami_id"]

          json.dump(manifest, open("ami-manifest.json", "w"), indent=2)
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Generate checksums
        run: sha256sum ecr-credential-provider-* ami-manifest.json sbom-*.spdx.json install-eks-dx-pod-identity*.sh > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ecr-credential-provider-*
            ami-manifest.json
            install-eks-dx-pod-identity*.sh
            sbom-*.spdx.json
            checksums.txt
          generate_release_notes: true
