# NOTE: Do NOT apply this file directly.
# Use configure-nodepools.sh which discovers runtime values (AMI ID, subnet, SG, CA bundle)
# and renders the Helm chart in node-pools/chart/.
# This file is a reference template only.

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ondemand-nodepool
spec:
  template:
    metadata:
      labels:
        node-type: "ondemand"
        provisioner: "karpenter"
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "c", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: ondemand-nodeclass

  limits:
    cpu: 100
    memory: 100Gi

  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
    expireAfter: 720h # 30 days

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: ondemand-nodeclass
spec:
  # Custom amiFamily: avoids Karpenter v1.10 bug where ResolveClusterCIDR always
  # runs for AL2023 regardless of eksControlPlane=false.
  # nodeadm bootstrap is handled explicitly in userData below.
  amiFamily: Custom
  amiSelectorTerms:
    - tags:
        karpenter.sh/discovery: "REPLACE_WITH_CLUSTER_NAME"

  instanceProfile: "REPLACE_WITH_INSTANCE_PROFILE_NAME"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "REPLACE_WITH_CLUSTER_NAME"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "REPLACE_WITH_CLUSTER_NAME"

  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="//"

    --//
    Content-Type: application/node.eks.aws

    ---
    apiVersion: node.eks.aws/v1alpha1
    kind: NodeConfig
    spec:
      cluster:
        name: REPLACE_WITH_CLUSTER_NAME
        apiServerEndpoint: REPLACE_WITH_API_SERVER_ENDPOINT
        certificateAuthority: REPLACE_WITH_CA_BUNDLE
        cidr: 10.96.0.0/12

    --//--

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required

  tags:
    Name: "karpenter-ondemand-node"
    Environment: "development"
    ManagedBy: "karpenter"
    "ebs.csi.aws.com/cluster-name": "REPLACE_WITH_CLUSTER_NAME"
