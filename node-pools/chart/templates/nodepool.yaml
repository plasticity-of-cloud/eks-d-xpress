apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: [{{ .Values.nodePool.capacityType | quote }}]
        - key: kubernetes.io/arch
          operator: In
          values: [{{ .Values.nodePool.arch | quote }}]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            {{- if hasSuffix "-gpu" .Values.nodeVariant }}
            - "p"
            - "g"
            {{- else if hasSuffix "-neuron" .Values.nodeVariant }}
            - "inf"
            - "trn"
            {{- else }}
            - "m"
            - "c"
            - "r"
            {{- end }}
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values:
            {{- if hasSuffix "-gpu" .Values.nodeVariant }}
            - "2"
            {{- else if hasSuffix "-neuron" .Values.nodeVariant }}
            - "0"
            {{- else }}
            - {{ .Values.nodePool.instanceGenerationGt | quote }}
            {{- end }}
  limits:
    cpu: {{ .Values.nodePool.cpuLimit | quote }}
    memory: {{ .Values.nodePool.memoryLimit | quote }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: {{ .Values.nodePool.consolidateAfter | quote }}
