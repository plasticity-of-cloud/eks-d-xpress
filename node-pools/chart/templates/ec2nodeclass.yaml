apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  instanceProfile: {{ .Values.instanceProfile | quote }}

  # Custom AMI family: skips eks:DescribeCluster CIDR detection (Karpenter v1.10 bug -
  # ResolveClusterCIDR always runs for AL2023 regardless of eksControlPlane=false).
  # Userdata below handles all bootstrap configuration for each OS variant.
  amiFamily: Custom
  amiSelectorTerms:
    - id: {{ .Values.amiId | quote }}

  subnetSelectorTerms:
    - id: {{ .Values.subnetId | quote }}

  securityGroupSelectorTerms:
    - id: {{ .Values.securityGroupId | quote }}

  {{- if hasPrefix "bottlerocket" .Values.nodeVariant }}
  userData: |
    [settings.kubernetes]
    api-server = {{ .Values.nodeConfig.apiServerEndpoint | quote }}
    cluster-certificate = {{ .Values.nodeConfig.certificateAuthority | quote }}
    cluster-name = {{ .Values.clusterName | quote }}
    cluster-dns-ip = {{ .Values.nodeConfig.clusterDnsIp | quote }}

    [settings.kubernetes.node-labels]
    "karpenter.sh/nodepool" = "default"
  {{- else }}
  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="//"

    --//
    Content-Type: application/node.eks.aws

    ---
    apiVersion: node.eks.aws/v1alpha1
    kind: NodeConfig
    spec:
      cluster:
        name: {{ .Values.clusterName }}
        apiServerEndpoint: {{ .Values.nodeConfig.apiServerEndpoint }}
        certificateAuthority: {{ .Values.nodeConfig.certificateAuthority }}
        cidr: {{ .Values.nodeConfig.serviceCidr }}
      kubelet:
        flags:
          - "--node-labels=karpenter.sh/nodepool=default"

    --//--
  {{- end }}

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  tags:
    Platform: eks-d-xpress
    Developer: {{ .Values.tenantId | quote }}
    ManagedBy: Karpenter
